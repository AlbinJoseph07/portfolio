<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Albin | Developer Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Plus Jakarta Sans', sans-serif;
    scroll-behavior:smooth;
}

body{
    background:#0f172a;
    color:white;
    overflow-x:hidden;
}

/* Animated Background */
body::before{
    content:"";
    position:fixed;
    width:200%;
    height:200%;
    background:radial-gradient(circle at 20% 30%, #3b82f6, transparent 40%),
               radial-gradient(circle at 80% 70%, #9333ea, transparent 40%);
    animation:moveBg 15s linear infinite alternate;
    z-index:-1;
    opacity:0.15;
}

@keyframes moveBg{
    from{transform:translate(0,0);}
    to{transform:translate(-200px,-150px);}
}

/* Navbar */
header{
    position:fixed;
    width:100%;
    padding:20px 60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    backdrop-filter:blur(12px);
    background:rgba(15,23,42,0.6);
    z-index:1000;
}

header h1{
    font-weight:800;
    font-size:22px;
    letter-spacing:1px;
}

nav a{
    color:white;
    margin-left:30px;
    text-decoration:none;
    font-weight:500;
    position:relative;
}

nav a::after{
    content:"";
    position:absolute;
    width:0%;
    height:2px;
    background:#3b82f6;
    left:0;
    bottom:-5px;
    transition:0.3s;
}

nav a:hover::after{
    width:100%;
}

/* Sections */
section{
    padding:120px 60px;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.hero{
    text-align:center;
}

.hero h2{
    font-size:55px;
    font-weight:800;
}

.hero span{
    color:#3b82f6;
}

.typing{
    font-size:22px;
    margin-top:20px;
    color:#94a3b8;
}

/* Glass Card */
.glass{
    background:rgba(255,255,255,0.05);
    border-radius:20px;
    padding:40px;
    backdrop-filter:blur(20px);
    box-shadow:0 20px 60px rgba(0,0,0,0.4);
}

/* Skills */
.skill{
    margin-bottom:25px;
}

.bar{
    height:8px;
    background:#1e293b;
    border-radius:10px;
    overflow:hidden;
}

.bar span{
    display:block;
    height:100%;
    background:linear-gradient(90deg,#3b82f6,#9333ea);
    width:0;
    transition:2s;
}

/* Contact */
input,textarea{
    width:100%;
    padding:14px;
    margin-bottom:20px;
    border-radius:10px;
    border:none;
    background:#1e293b;
    color:white;
}

button{
    padding:14px 35px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#3b82f6,#9333ea);
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 30px rgba(147,51,234,0.5);
}

footer{
    text-align:center;
    padding:30px;
    background:#0f172a;
    color:#94a3b8;
}

/* Scroll Animation */
.hidden{
    opacity:0;
    transform:translateY(40px);
    transition:1s;
}

.show{
    opacity:1;
    transform:translateY(0);
}
</style>
</head>

<body>

<header>
    <h1>Albin</h1>
    <nav>
        <a href="#home">Home</a>
        <a href="#skills">Skills</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<section id="home" class="hero hidden">
    <h2>Hi, I'm <span>Albin</span> 👋</h2>
    <div class="typing"></div>
</section>

<section id="skills" class="hidden">
    <h2>My Skills</h2>
    <div class="glass">
        <div class="skill">
            <p>HTML</p>
            <div class="bar"><span style="width:90%"></span></div>
        </div>
        <div class="skill">
            <p>CSS</p>
            <div class="bar"><span style="width:85%"></span></div>
        </div>
        <div class="skill">
            <p>JavaScript</p>
            <div class="bar"><span style="width:75%"></span></div>
        </div>
        <div class="skill">
            <p>Node.js</p>
            <div class="bar"><span style="width:70%"></span></div>
        </div>
    </div>
</section>

<section id="contact" class="hidden">
    <h2>Contact Me</h2>
    <div class="glass">
        <form id="contactForm">
            <input type="text" id="name" placeholder="Your Name" required>
            <input type="email" id="email" placeholder="Your Email" required>
            <textarea id="message" rows="5" placeholder="Your Message" required></textarea>
            <button type="submit">Send Message</button>
        </form>
        <p id="responseMsg"></p>
    </div>
</section>

<footer>
    © 2026 Albin | Premium Developer Portfolio
</footer>

<script>
/* Typing Effect */
const words = ["Full Stack Developer","BCA Student","AI Enthusiast"];
let i=0, j=0, currentWord="", isDeleting=false;
function type(){
    currentWord = words[i];
    if(!isDeleting){
        document.querySelector(".typing").textContent = currentWord.slice(0,++j);
        if(j===currentWord.length){ isDeleting=true; setTimeout(type,1000); return;}
    } else {
        document.querySelector(".typing").textContent = currentWord.slice(0,--j);
        if(j===0){ isDeleting=false; i=(i+1)%words.length;}
    }
    setTimeout(type,100);
}
type();

/* Scroll Reveal */
const observer = new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
        if(entry.isIntersecting){
            entry.target.classList.add("show");
        }
    });
});
document.querySelectorAll(".hidden").forEach(el=>observer.observe(el));

/* Backend Connection (UNCHANGED) */
const form = document.getElementById("contactForm");
const responseMsg = document.getElementById("responseMsg");

form.addEventListener("submit", async function(e) {
    e.preventDefault();

    const data = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        message: document.getElementById("message").value
    };

    try {
        const res = await fetch("https://portfolio-backend-ovx7.onrender.com/contact", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        });

        if(res.ok){
            responseMsg.innerText="Message sent successfully!";
            form.reset();
        } else {
            responseMsg.innerText="Something went wrong!";
        }
    } catch(error){
        responseMsg.innerText="Server error!";
    }
});
</script>

</body>
</html>
