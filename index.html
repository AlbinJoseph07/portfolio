<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Albin | Elite Developer</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Plus Jakarta Sans', sans-serif;
scroll-behavior:smooth;
}

body{
background:#0b0f19;
color:white;
overflow-x:hidden;
}

/* Scroll Progress */
#progress{
position:fixed;
top:0;
left:0;
height:4px;
background:linear-gradient(90deg,#3b82f6,#9333ea);
width:0%;
z-index:9999;
}

/* Cursor Glow */
.cursor{
position:fixed;
width:20px;
height:20px;
border-radius:50%;
background:rgba(147,51,234,0.6);
pointer-events:none;
mix-blend-mode:screen;
transform:translate(-50%,-50%);
transition:transform 0.1s ease;
z-index:9999;
}

/* Navbar */
header{
position:fixed;
width:100%;
padding:20px 60px;
display:flex;
justify-content:space-between;
align-items:center;
backdrop-filter:blur(20px);
background:rgba(11,15,25,0.6);
z-index:1000;
}

nav a{
color:white;
margin-left:30px;
text-decoration:none;
position:relative;
}

nav a::after{
content:"";
position:absolute;
width:0;
height:2px;
background:#3b82f6;
left:0;
bottom:-5px;
transition:0.3s;
}

nav a:hover::after{
width:100%;
}

/* Sections */
section{
padding:120px 60px;
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
}

.hero{
text-align:center;
}

.hero h2{
font-size:65px;
font-weight:800;
background:linear-gradient(90deg,#3b82f6,#9333ea);
-webkit-background-clip:text;
color:transparent;
animation:gradientMove 4s infinite linear;
background-size:200% auto;
}

@keyframes gradientMove{
0%{background-position:0%}
100%{background-position:200%}
}

.typing{
font-size:22px;
color:#94a3b8;
margin-top:20px;
}

/* Glass Card */
.glass{
background:rgba(255,255,255,0.05);
border-radius:25px;
padding:50px;
backdrop-filter:blur(25px);
box-shadow:0 30px 80px rgba(0,0,0,0.6);
transition:0.4s;
}

.glass:hover{
transform:translateY(-10px);
}

/* Skills */
.skill{
margin-bottom:30px;
}

.bar{
height:10px;
background:#1e293b;
border-radius:10px;
overflow:hidden;
}

.bar span{
display:block;
height:100%;
background:linear-gradient(90deg,#3b82f6,#9333ea);
width:0;
transition:2s;
}

/* Inputs */
input,textarea{
width:100%;
padding:16px;
margin-bottom:20px;
border-radius:12px;
border:none;
background:#1e293b;
color:white;
}

button{
padding:16px 40px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#3b82f6,#9333ea);
color:white;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 15px 40px rgba(147,51,234,0.6);
}

footer{
text-align:center;
padding:40px;
color:#94a3b8;
}

/* Reveal */
.hidden{
opacity:0;
transform:translateY(60px);
transition:1s;
}

.show{
opacity:1;
transform:translateY(0);
}
</style>
</head>

<body>

<div id="progress"></div>
<div class="cursor"></div>

<header>
<h1>Albin</h1>
<nav>
<a href="#home">Home</a>
<a href="#skills">Skills</a>
<a href="#contact">Contact</a>
</nav>
</header>

<section id="home" class="hero hidden">
<h2>Albin</h2>
<div class="typing"></div>
</section>

<section id="skills" class="hidden">
<h2>My Skills</h2>
<div class="glass">
<div class="skill">
<p>HTML</p>
<div class="bar"><span style="width:90%"></span></div>
</div>
<div class="skill">
<p>CSS</p>
<div class="bar"><span style="width:85%"></span></div>
</div>
<div class="skill">
<p>JavaScript</p>
<div class="bar"><span style="width:75%"></span></div>
</div>
<div class="skill">
<p>Node.js</p>
<div class="bar"><span style="width:70%"></span></div>
</div>
</div>
</section>

<section id="contact" class="hidden">
<h2>Contact Me</h2>
<div class="glass">
<form id="contactForm">
<input type="text" id="name" placeholder="Your Name" required>
<input type="email" id="email" placeholder="Your Email" required>
<textarea id="message" rows="5" placeholder="Your Message" required></textarea>
<button type="submit">Send Message</button>
</form>
<p id="responseMsg"></p>
</div>
</section>

<footer>
© 2026 Albin | Elite Portfolio
</footer>

<script>
/* Scroll Progress */
window.onscroll = function(){
let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
let scrolled = (winScroll / height) * 100;
document.getElementById("progress").style.width = scrolled + "%";
};

/* Cursor Glow */
const cursor = document.querySelector(".cursor");
document.addEventListener("mousemove", e=>{
cursor.style.left = e.clientX+"px";
cursor.style.top = e.clientY+"px";
});

/* Typing */
const words=["Full Stack Developer","BCA Student","AI Enthusiast"];
let i=0,j=0,isDeleting=false;
function type(){
let current=words[i];
if(!isDeleting){
document.querySelector(".typing").textContent=current.slice(0,++j);
if(j===current.length){isDeleting=true;setTimeout(type,1000);return;}
}else{
document.querySelector(".typing").textContent=current.slice(0,--j);
if(j===0){isDeleting=false;i=(i+1)%words.length;}
}
setTimeout(type,100);
}
type();

/* Reveal */
const observer=new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){entry.target.classList.add("show");}
});
});
document.querySelectorAll(".hidden").forEach(el=>observer.observe(el));

/* BACKEND (UNCHANGED) */
const form=document.getElementById("contactForm");
const responseMsg=document.getElementById("responseMsg");

form.addEventListener("submit",async function(e){
e.preventDefault();

const data={
name:document.getElementById("name").value,
email:document.getElementById("email").value,
message:document.getElementById("message").value
};

try{
const res=await fetch("https://portfolio-backend-ovx7.onrender.com/contact",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
});

if(res.ok){
responseMsg.innerText="Message sent successfully!";
form.reset();
}else{
responseMsg.innerText="Something went wrong!";
}
}catch(error){
responseMsg.innerText="Server error!";
}
});
</script>

</body>
</html>
