<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Albin | Luxury Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Plus Jakarta Sans',sans-serif;
}

html{
scroll-behavior:smooth;
scroll-snap-type:y mandatory;
}

body{
background:#0e1117;
color:white;
overflow-x:hidden;
}

/* LOADER */
#loader{
position:fixed;
width:100%;
height:100vh;
background:#0e1117;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
font-size:40px;
font-weight:800;
letter-spacing:5px;
animation:fadeOut 1s ease forwards;
animation-delay:2s;
}

@keyframes fadeOut{
to{opacity:0;visibility:hidden;}
}

/* NAVBAR */
header{
position:fixed;
width:100%;
padding:25px 80px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(14,17,23,0.6);
backdrop-filter:blur(20px);
z-index:1000;
}

nav a{
color:#aaa;
margin-left:40px;
text-decoration:none;
transition:0.3s;
}

nav a:hover{
color:white;
}

/* SECTIONS */
section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
scroll-snap-align:start;
padding:100px 40px;
}

/* HERO */
.hero h1{
font-size:80px;
font-weight:800;
letter-spacing:2px;
}

.hero p{
margin-top:20px;
color:#888;
font-size:20px;
}

/* FLOATING GRID BG */
.grid{
position:fixed;
width:100%;
height:100%;
background-image:linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
background-size:40px 40px;
z-index:-1;
animation:moveGrid 15s linear infinite;
}

@keyframes moveGrid{
from{transform:translateY(0);}
to{transform:translateY(40px);}
}

/* SKILLS CARDS */
.skills{
display:flex;
gap:40px;
flex-wrap:wrap;
justify-content:center;
margin-top:50px;
}

.card{
width:240px;
height:180px;
background:rgba(255,255,255,0.05);
border-radius:25px;
display:flex;
justify-content:center;
align-items:center;
font-size:22px;
transition:0.4s;
backdrop-filter:blur(20px);
}

.card:hover{
transform:translateY(-15px) scale(1.05);
}

/* CONTACT */
.contact-box{
width:100%;
max-width:600px;
background:rgba(255,255,255,0.05);
padding:50px;
border-radius:30px;
backdrop-filter:blur(20px);
}

input,textarea{
width:100%;
padding:15px;
margin-bottom:20px;
border-radius:15px;
border:none;
background:#1c2128;
color:white;
}

button{
padding:15px 40px;
border:none;
border-radius:30px;
background:white;
color:black;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

/* FOOTER */
footer{
padding:40px;
text-align:center;
color:#666;
}
</style>
</head>

<body>

<div id="loader">ALBIN</div>
<div class="grid"></div>

<header>
<h2>Albin</h2>
<nav>
<a href="#home">Home</a>
<a href="#skills">Skills</a>
<a href="#contact">Contact</a>
</nav>
</header>

<section id="home" class="hero">
<h1>Albin</h1>
<p>Crafting Digital Experiences</p>
</section>

<section id="skills">
<h2>Core Strength</h2>
<div class="skills">
<div class="card">HTML</div>
<div class="card">CSS</div>
<div class="card">JavaScript</div>
<div class="card">Node.js</div>
<div class="card">UI Design</div>
<div class="card">AI Basics</div>
</div>
</section>

<section id="contact">
<h2>Let's Work Together</h2>
<div class="contact-box">
<form id="contactForm">
<input type="text" id="name" placeholder="Your Name" required>
<input type="email" id="email" placeholder="Your Email" required>
<textarea id="message" rows="5" placeholder="Your Message" required></textarea>
<button type="submit">Send Message</button>
</form>
<p id="responseMsg"></p>
</div>
</section>

<footer>
© 2026 Albin | Luxury Experience
</footer>

<script>
/* BACKEND CONNECTION UNCHANGED */
const form=document.getElementById("contactForm");
const responseMsg=document.getElementById("responseMsg");

form.addEventListener("submit",async function(e){
e.preventDefault();
const data={
name:document.getElementById("name").value,
email:document.getElementById("email").value,
message:document.getElementById("message").value
};
try{
const res=await fetch("https://portfolio-backend-ovx7.onrender.com/contact",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
});
if(res.ok){
responseMsg.innerText="Message sent successfully!";
form.reset();
}else{
responseMsg.innerText="Something went wrong!";
}
}catch(error){
responseMsg.innerText="Server error!";
}
});
</script>

</body>
</html>
